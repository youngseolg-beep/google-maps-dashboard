<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SV 통합 리뷰 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star-active { color: #fbbf24; }
        .star-inactive { color: #d1d5db; }
        .active-sv { background-color: #2563eb !important; color: white !important; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm">
            <h1 class="text-2xl font-black text-slate-800">📊 SV REVIEW MASTER <span class="text-blue-500 text-sm font-normal ml-2">v1.2.3</span></h1>
            <div id="last-update" class="text-xs text-slate-400">데이터 연결 시도 중...</div>
        </header>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <button onclick="selectSV('이여명', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:bg-slate-50 transition-all font-bold text-slate-600">이여명 SV</button>
            <button onclick="selectSV('강소영', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:bg-slate-50 transition-all font-bold text-slate-600">강소영 SV</button>
            <button onclick="selectSV('소도희', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:bg-slate-50 transition-all font-bold text-slate-600">소도희 SV</button>
            <button onclick="selectSV('최성환', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:bg-slate-50 transition-all font-bold text-slate-600">최성환 SV</button>
        </div>

        <div class="flex gap-6">
            <div class="w-1/4 bg-white p-4 rounded-2xl shadow-sm h-fit min-h-[300px]">
                <h3 class="font-bold mb-4 text-slate-500 text-sm uppercase tracking-wider">담당 매장 목록</h3>
                <div id="store-list" class="space-y-2 text-xs text-slate-400">SV를 선택해주세요.</div>
            </div>

            <div class="w-3/4">
                <h2 id="current-title" class="text-xl font-bold text-slate-800 mb-4">전체 리뷰 현황</h2>
                <div id="review-container" class="space-y-4">
                    <div class="text-center py-20 text-slate-400 bg-white rounded-2xl border-2 border-dashed border-slate-100">데이터를 불러오는 중입니다...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 수집된 URL의 끝자리 번호와 매칭
        const SV_MAP = {
            '이여명': ['1', '5'],
            '강소영': ['2', '6'],
            '소도희': ['3', '7'],
            '최성환': ['4', '8', '9'] // 암스테르담이 9번이었으므로 추가
        };

        let allReviews = [];

        async function init() {
            // [해결책] GitHub Pages 배포 구조에 맞춰 'data/reviews.json'을 최우선으로 탐색
            const dataPath = 'public/data/reviews.json'; 
            
            try {
                console.log("🚀 데이터 로드 시작...");
                const res = await fetch(dataPath);
                
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                
                // 텍스트로 먼저 받아서 JSON인지 확인 (보안 강화)
                const rawText = await res.text();
                try {
                    allReviews = JSON.parse(rawText);
                    console.log("✅ 데이터 수집 성공:", allReviews.length, "건");
                    document.getElementById('last-update').innerText = `최종 업데이트 완료 (총 ${allReviews.length}건)`;
                    document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-slate-400">담당 SV를 선택하면 리뷰가 표시됩니다.</div>';
                } catch (e) {
                    console.error("❌ JSON 파싱 실패:", e);
                    document.getElementById('last-update').innerText = "데이터 형식이 잘못되었습니다.";
                }
            } catch (e) {
                console.error("❌ 파일 로드 실패:", e);
                document.getElementById('last-update').innerText = "데이터 파일을 찾을 수 없습니다. (Actions 실행 확인 필요)";
            }
        }

        function selectSV(svName, btn) {
            document.querySelectorAll('.sv-tab').forEach(b => b.classList.remove('active-sv'));
            btn.classList.add('active-sv');

            const ids = SV_MAP[svName];
            // URL에 해당 번호가 포함되어 있는지 확인
            const filtered = allReviews.filter(r => 
                ids.some(id => r.store_url.endsWith(`/${id}`) || r.store_url.includes(`/${id}/`))
            );

            console.log(`${svName} 데이터 필터링 결과:`, filtered.length, "건");

            const storeListDiv = document.getElementById('store-list');
            const stores = [...new Set(filtered.map(r => r.store_name))];

            if(stores.length > 0) {
                storeListDiv.innerHTML = stores.map(s => `
                    <button onclick="filterStore('${s}', '${svName}')" class="w-full text-left p-3 rounded-lg hover:bg-blue-50 text-sm font-medium text-slate-700 transition-all border border-transparent hover:border-blue-100">📍 ${s}</button>
                `).join('');
                renderReviews(filtered);
                document.getElementById('current-title').innerText = `${svName} SV 담당 리뷰 (${filtered.length}건)`;
            } else {
                storeListDiv.innerHTML = '<p class="text-red-400">데이터가 없습니다.<br>URL 매칭을 확인하세요.</p>';
                document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-slate-400">표시할 데이터가 없습니다.</div>';
            }
        }

        function filterStore(storeName, svName) {
            const storeData = allReviews.filter(r => r.store_name === storeName);
            renderReviews(storeData);
            document.getElementById('current-title').innerText = `${storeName} 리뷰 (${storeData.length}건)`;
        }

        function renderReviews(data) {
            const container = document.getElementById('review-container');
            container.innerHTML = data.map(r => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">${r.store_name}</span>
                        <div class="text-amber-400 font-bold">★ ${r.rating || 5}</div>
                    </div>
                    <p class="text-slate-700 leading-relaxed">${r.text}</p>
                    <div class="text-[10px] text-slate-300 mt-4 border-t pt-2">${r.collected_at} 수집됨</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
