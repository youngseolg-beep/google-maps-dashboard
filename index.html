<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SV 통합 리뷰 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-sv { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm">
            <h1 class="text-2xl font-black text-slate-800">📊 SV REVIEW MASTER <span class="text-blue-500 text-sm font-normal ml-2">v1.2.7</span></h1>
            <div id="status-tag" class="px-3 py-1 bg-green-100 rounded-full text-[10px] font-bold text-green-600">데이터 연결 중...</div>
        </header>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <button onclick="selectSV('이여명', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">이여명 SV</button>
            <button onclick="selectSV('강소영', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">강소영 SV</button>
            <button onclick="selectSV('소도희', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">소도희 SV</button>
            <button onclick="selectSV('최성환', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">최성환 SV</button>
        </div>

        <div class="flex gap-6">
            <div class="w-1/4 bg-white p-4 rounded-2xl shadow-sm h-fit min-h-[300px]">
                <h3 class="font-bold mb-4 text-slate-400 text-[10px] uppercase">담당 매장 목록</h3>
                <div id="store-list" class="space-y-2"></div>
            </div>
            <div class="w-3/4">
                <div id="review-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // [수정] 주소 숫자 대신 "매장 이름"의 핵심 키워드로 매칭합니다.
        const SV_MAP = {
            '이여명': ['Bornga'], // 예시: 본가
            '강소영': ['Hong Kong'], // 예시: 홍콩반점
            '소도희': ['Saemaul'], // 예시: 새마을식당
            '최성환': ["Paik's Noodle", "Paik's", "Paiks", "Amsterdam"] // 암스테르담 포함
        };

        let allReviews = [];

        async function init() {
            const paths = ['data/reviews.json', 'public/data/reviews.json', 'reviews.json'];
            let loaded = false;
            for (let p of paths) {
                try {
                    const res = await fetch(p);
                    if (res.ok) {
                        allReviews = await res.json();
                        loaded = true; break;
                    }
                } catch(e) {}
            }

            const status = document.getElementById('status-tag');
            if (loaded) {
                status.innerText = `연결됨: ${allReviews.length}건`;
                document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">상단 SV 버튼을 눌러주세요.</div>';
            }
        }

        function selectSV(svName, btn) {
            document.querySelectorAll('.sv-tab').forEach(b => b.classList.remove('active-sv'));
            btn.classList.add('active-sv');

            const keywords = SV_MAP[svName];
            
            // 매장 이름(store_name)에 키워드가 포함되어 있는지 체크
            const filtered = allReviews.filter(r => {
                const name = r.store_name || "";
                return keywords.some(key => name.toLowerCase().includes(key.toLowerCase()));
            });

            const stores = [...new Set(filtered.map(r => r.store_name))];
            const storeListDiv = document.getElementById('store-list');
            
            if(stores.length > 0) {
                storeListDiv.innerHTML = stores.map(s => `
                    <button onclick="filterStore('${s}')" class="w-full text-left p-3 rounded-lg hover:bg-blue-50 text-xs font-bold text-slate-700 border border-slate-100 transition-all">📍 ${s}</button>
                `).join('');
                renderReviews(filtered);
            } else {
                storeListDiv.innerHTML = '<p class="text-[10px] text-red-400">담당 매장 데이터 없음</p>';
                document.getElementById('review-container').innerHTML = `
                    <div class="text-center py-20 text-slate-400">
                        해당 SV 이름으로 매칭된 매장이 없습니다.<br>
                        <span class="text-[10px]">수집된 매장 이름 예시: ${allReviews[0]?.store_name || '없음'}</span>
                    </div>`;
            }
        }

        function filterStore(name) {
            const data = allReviews.filter(r => r.store_name === name);
            renderReviews(data);
        }

        function renderReviews(data) {
            document.getElementById('review-container').innerHTML = data.map(r => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${r.store_name}</span>
                        <span class="text-amber-400 text-xs font-bold">★ ${r.rating || 5}</span>
                    </div>
                    <p class="text-sm text-slate-700 leading-relaxed">${r.text}</p>
                    <div class="text-[9px] text-slate-300 mt-4">${r.collected_at} 수집</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
