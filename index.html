 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SV 통합 리뷰 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-sv { background-color: #2563eb !important; color: white !important; }
        .active-store { background-color: #eff6ff !important; border-color: #2563eb !important; color: #1d4ed8 !important; }
        .active-keyword { box-shadow: 0 0 0 2px #111827 inset !important; transform: translateY(-1px); }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-slate-800">
                    📊 SV REVIEW MASTER
                    <span class="text-blue-500 text-sm font-normal ml-2">v1.8.1</span>
                </h1>
                <p class="text-xs text-slate-400 mt-1">Google Maps 리뷰 자동 수집 · 담당 SV별 리뷰 관리</p>
            </div>
            <div id="status-tag" class="px-3 py-1 bg-green-100 rounded-full text-[10px] font-bold text-green-600">데이터 연결 중...</div>
        </header>

        <div id="global-summary" class="grid grid-cols-2 gap-4 mb-6 hidden">
            <div class="bg-white rounded-2xl shadow-sm p-4">
                <div class="text-[10px] text-slate-400 font-bold">전체 리뷰 마지막 크롤링 시간</div>
                <div id="global-crawled-at" class="text-sm font-black text-blue-600 mt-2">-</div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-4">
                <div class="text-[10px] text-slate-400 font-bold">크롤링 성공 여부</div>
                <div id="global-crawl-status" class="text-sm font-black text-emerald-600 mt-2">-</div>
                <div id="global-failed-stores" class="text-[10px] text-red-500 mt-2 hidden"></div>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-6">
            <button onclick="selectSV('이여명', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">
                이여명 SV
                <div class="text-[10px] font-normal mt-1 text-slate-400">대만 · 싱가포르</div>
            </button>
            <button onclick="selectSV('강소영', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">
                강소영 SV
                <div class="text-[10px] font-normal mt-1 text-slate-400">몽골 · 네덜란드</div>
            </button>
            <button onclick="selectSV('소도희', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">
                소도희 SV
                <div class="text-[10px] font-normal mt-1 text-slate-400">호주 · 태국 · 캄보디아</div>
            </button>
            <button onclick="selectSV('최성환', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm font-bold text-slate-600 transition-all">
                최성환 SV
                <div class="text-[10px] font-normal mt-1 text-slate-400">인도네시아 · 필리핀</div>
            </button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-col gap-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <div>
                    <div id="current-title" class="text-sm font-black text-slate-700">SV를 선택해주세요</div>
                    <div id="current-subtitle" class="text-[11px] text-slate-400 mt-1">담당 국가 기준으로 리뷰가 자동 분류됩니다.</div>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-[11px] font-bold text-slate-400">정렬</span>
                    <select id="sort-select" onchange="handleSortChange()" class="text-xs font-bold border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-700 outline-none">
                        <option value="latest">날짜 순 · 최신순</option>
                        <option value="rating-high">별점 높은 순</option>
                        <option value="rating-low">별점 낮은 순</option>
                        <option value="oldest">날짜 순 · 오래된순</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between gap-3 flex-wrap mb-2">
                    <div class="text-[10px] font-black text-slate-400">KEYWORD FILTER</div>
                    <button onclick="toggleLowRatingMode(this)" id="low-rating-toggle" class="px-3 py-2 rounded-full bg-red-50 text-red-600 text-[11px] font-black hover:bg-red-100 transition-all">
                        🚨 LOW REVIEWS ONLY
                    </button>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button onclick="applyKeywordFilter('jjamppong', this)" class="keyword-btn px-3 py-2 rounded-full bg-red-50 text-red-600 text-[11px] font-black hover:bg-red-100 transition-all">🍜 Jjamppong</button>
                    <button onclick="applyKeywordFilter('jjajang', this)" class="keyword-btn px-3 py-2 rounded-full bg-slate-100 text-slate-700 text-[11px] font-black hover:bg-slate-200 transition-all">🖤 Jjajang</button>
                    <button onclick="applyKeywordFilter('tangsuyuk', this)" class="keyword-btn px-3 py-2 rounded-full bg-amber-50 text-amber-700 text-[11px] font-black hover:bg-amber-100 transition-all">🥩 Tangsuyuk</button>
                    <button onclick="applyKeywordFilter('service', this)" class="keyword-btn px-3 py-2 rounded-full bg-blue-50 text-blue-700 text-[11px] font-black hover:bg-blue-100 transition-all">😊 Service</button>
                    <button onclick="applyKeywordFilter('waiting', this)" class="keyword-btn px-3 py-2 rounded-full bg-orange-50 text-orange-700 text-[11px] font-black hover:bg-orange-100 transition-all">⏰ Waiting</button>
                    <button onclick="applyKeywordFilter('delivery', this)" class="keyword-btn px-3 py-2 rounded-full bg-purple-50 text-purple-700 text-[11px] font-black hover:bg-purple-100 transition-all">🛵 Delivery</button>
                    <button onclick="applyKeywordFilter('spicy', this)" class="keyword-btn px-3 py-2 rounded-full bg-pink-50 text-pink-700 text-[11px] font-black hover:bg-pink-100 transition-all">🌶 Spicy</button>
                    <button onclick="applyKeywordFilter('portion', this)" class="keyword-btn px-3 py-2 rounded-full bg-emerald-50 text-emerald-700 text-[11px] font-black hover:bg-emerald-100 transition-all">🍚 Portion</button>
                    <button onclick="applyKeywordFilter('price', this)" class="keyword-btn px-3 py-2 rounded-full bg-yellow-50 text-yellow-700 text-[11px] font-black hover:bg-yellow-100 transition-all">💰 Price</button>
                    <button onclick="applyKeywordFilter('clean', this)" class="keyword-btn px-3 py-2 rounded-full bg-cyan-50 text-cyan-700 text-[11px] font-black hover:bg-cyan-100 transition-all">🧼 Clean</button>
                    <button onclick="clearKeywordFilter()" class="px-3 py-2 rounded-full bg-black text-white text-[11px] font-black hover:opacity-80 transition-all">✕ Reset</button>
                </div>
            </div>
        </div>

        <div class="flex gap-6">
            <div class="w-[340px] shrink-0">
                <div class="bg-white p-4 rounded-2xl shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-black text-slate-700 text-sm">
                            🏪 STORE STATUS
                        </h3>

                        <div class="text-[10px] font-bold text-slate-400">
                            운영 상태 모니터링
                        </div>
                    </div>

                    <div id="store-list" class="space-y-3"></div>
                </div>
            </div>

            <div class="flex-1 min-w-0">
                <div id="review-summary" class="mb-4 grid grid-cols-4 gap-3 hidden">
                    <div class="bg-white rounded-2xl shadow-sm p-4">
                        <div class="text-[10px] text-slate-400 font-bold">선택 기준 리뷰 수</div>
                        <div id="summary-count" class="text-xl font-black text-slate-800 mt-1">0</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm p-4">
                        <div class="text-[10px] text-slate-400 font-bold">저평점 리뷰 수</div>
                        <div id="summary-low" class="text-xl font-black text-red-500 mt-1">0</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm p-4">
                        <div class="text-[10px] text-slate-400 font-bold">최신 리뷰 작성일</div>
                        <div id="summary-latest" class="text-sm font-black text-emerald-600 mt-2">-</div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm p-4">
                        <div class="text-[10px] text-slate-400 font-bold">마지막 수집일</div>
                        <div id="summary-collected" class="text-sm font-black text-blue-600 mt-2">-</div>
                    </div>
                </div>

                <div id="review-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SV_COUNTRY_MAP = {
            '이여명': ['taiwan', 'singapore', '대만', '싱가포르'],
            '강소영': ['mongolia', 'netherlands', 'amsterdam', '몽골', '네덜란드'],
            '소도희': ['australia', 'thailand', 'cambodia', '호주', '태국', '캄보디아'],
            '최성환': ['indonesia', 'philippines', '인도네시아', '필리핀']
        };

        const KEYWORD_GROUPS = {
            jjamppong: ['jjampong', 'jjamppong', 'jjam pong', 'jampong', 'janmpong', 'spicy noodle', 'spicy soup', 'seafood noodle'],
            jjajang: ['jjajang', 'black bean noodle', 'black noodle'],
            tangsuyuk: ['tangsuyuk', 'sweet sour pork', 'sweet and sour pork', 'fried pork'],
            service: ['service', 'friendly', 'kind', 'staff', 'rude'],
            waiting: ['wait', 'waiting', 'slow', 'long time'],
            delivery: ['delivery', 'takeout', 'take away', 'ubereats'],
            spicy: ['spicy', 'hot', 'too spicy', 'mild'],
            portion: ['portion', 'small', 'large', 'quantity'],
            price: ['price', 'expensive', 'cheap', 'value'],
            clean: ['clean', 'dirty', 'hygiene', 'toilet']
        };

        let allReviews = [];
        let crawlStatus = null;
        let currentSV = null;
        let currentSVReviews = [];
        let currentStore = 'ALL';
        let currentSort = 'latest';
        let currentKeyword = null;
        let lowRatingOnly = false;
        let visibleReviewCount = 30;

        async function init() {
            const reviewPaths = ['data/reviews.json', 'public/data/reviews.json', 'reviews.json'];
            const statusPaths = ['data/crawl_status.json', 'public/data/crawl_status.json', 'crawl_status.json'];

            let reviewsLoaded = false;

            for (let p of reviewPaths) {
                try {
                    const res = await fetch(p);
                    if (res.ok) {
                        allReviews = await res.json();
                        reviewsLoaded = true;
                        break;
                    }
                } catch(e) {}
            }

            for (let p of statusPaths) {
                try {
                    const res = await fetch(p);
                    if (res.ok) {
                        crawlStatus = await res.json();
                        break;
                    }
                } catch(e) {}
            }

            const status = document.getElementById('status-tag');

            if (reviewsLoaded) {
                status.innerText = `리뷰 데이터 연결됨`;
                renderGlobalSummary();
                document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">상단 SV 버튼을 눌러주세요.</div>';
            } else {
                status.innerText = '데이터 연결 실패';
                status.className = 'px-3 py-1 bg-red-100 rounded-full text-[10px] font-bold text-red-600';
                document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-red-400 font-bold">reviews.json을 불러오지 못했습니다.</div>';
            }
        }

        function renderGlobalSummary() {
            document.getElementById('global-summary').classList.remove('hidden');

            const crawledAt = crawlStatus?.last_crawled_at || getLatestCollectedAt(allReviews);
            const totalStores = crawlStatus?.total_stores || '-';
            const successCount = crawlStatus?.success_count ?? '-';
            const failedCount = crawlStatus?.failed_count ?? 0;
            const failedStores = crawlStatus?.failed_stores || [];

            document.getElementById('global-crawled-at').innerText = crawledAt || '-';

            const statusEl = document.getElementById('global-crawl-status');
            const failedEl = document.getElementById('global-failed-stores');

            if (crawlStatus) {
                if (failedCount === 0) {
                    statusEl.innerText = `성공 ${successCount}/${totalStores}`;
                    statusEl.className = 'text-sm font-black text-emerald-600 mt-2';
                    failedEl.classList.add('hidden');
                    failedEl.innerText = '';
                } else {
                    statusEl.innerText = `일부 실패 ${successCount}/${totalStores}`;
                    statusEl.className = 'text-sm font-black text-red-500 mt-2';
                    failedEl.classList.remove('hidden');
                    failedEl.innerText = `실패 매장: ${failedStores.map(s => s.store_name).join(', ')}`;
                }
            } else {
                statusEl.innerText = '상태 파일 없음';
                statusEl.className = 'text-sm font-black text-amber-500 mt-2';
                failedEl.classList.remove('hidden');
                failedEl.innerText = 'crawl_status.json을 찾지 못했습니다.';
            }
        }

        function normalizeText(value) {
            return String(value || '').toLowerCase();
        }

        function inferCountryText(review) {
            const combined = [
                review.store_name,
                review.country,
                review.address,
                review.location,
                review.city
            ].map(normalizeText).join(' ');

            return combined;
        }

        function isReviewMatchedToSV(review, svName) {
            const keywords = SV_COUNTRY_MAP[svName] || [];
            const target = inferCountryText(review);
            return keywords.some(keyword => target.includes(keyword.toLowerCase()));
        }

        function selectSV(svName, btn) {
            currentSV = svName;
            currentStore = 'ALL';
            currentKeyword = null;
            lowRatingOnly = false;
            visibleReviewCount = 30;

            document.querySelectorAll('.sv-tab').forEach(b => b.classList.remove('active-sv'));
            btn.classList.add('active-sv');

            document.querySelectorAll('.keyword-btn').forEach(b => b.classList.remove('active-keyword'));
            const lowToggle = document.getElementById('low-rating-toggle');
            if (lowToggle) lowToggle.classList.remove('active-keyword');

            currentSVReviews = allReviews.filter(r => isReviewMatchedToSV(r, svName));

            document.getElementById('current-title').innerText = `${svName} SV 담당 리뷰`;
            document.getElementById('current-subtitle').innerText = `담당 국가: ${getCountryLabel(svName)}`;

            renderStoreList(currentSVReviews);
            refreshCurrentReviews();
        }

        function getCountryLabel(svName) {
            const labels = {
                '이여명': '대만 · 싱가포르',
                '강소영': '몽골 · 네덜란드',
                '소도희': '호주 · 태국 · 캄보디아',
                '최성환': '인도네시아 · 필리핀'
            };

            return labels[svName] || '-';
        }

        function renderStoreList(data) {
            const stores = [...new Set(data.map(r => r.store_name || 'Unknown Store'))];

            const storeListDiv = document.getElementById('store-list');

            if (!stores.length) {
                storeListDiv.innerHTML = `
                    <div class="text-center py-10 text-slate-400 text-xs">
                        매장 데이터 없음
                    </div>
                `;
                document.getElementById('review-summary').classList.add('hidden');
                document.getElementById('review-container').innerHTML = `
                    <div class="text-center py-20 text-slate-400">
                        해당 SV 담당 국가로 매칭된 매장이 없습니다.<br>
                        <span class="text-[10px]">수집된 매장 이름 예시: ${escapeHtml(allReviews[0]?.store_name || '없음')}</span>
                    </div>
                `;
                return;
            }

            const cards = stores.map(storeName => {
                const reviews = data.filter(
                    r => (r.store_name || 'Unknown Store') === storeName
                );

                const totalReviews = reviews.length;

                const lowReviews = reviews.filter(
                    r => Number(r.rating || 0) <= 3
                ).length;

                const latestReview = getLatestReviewDate(reviews);

                const collectedAt = getLatestCollectedAt(reviews);

                const recent7Days = reviews.filter(r => {
                    const score = estimateDateAgeScore(r.date);
                    return score <= 7;
                }).length;

                const isActive = currentStore === storeName;

                return `
                    <button
                        onclick="filterStore('${escapeForOnclick(storeName)}', this)"
                        class="
                            store-btn
                            w-full
                            text-left
                            rounded-2xl
                            border
                            transition-all
                            p-4
                            ${isActive
                                ? 'border-blue-500 bg-blue-50'
                                : 'border-slate-200 bg-white hover:bg-slate-50'}
                        "
                    >
                        <div class="flex items-start justify-between gap-2">
                            <div class="min-w-0">
                                <div class="text-sm font-black text-slate-800 leading-snug">
                                    ${escapeHtml(storeName)}
                                </div>

                                <div class="text-[10px] text-slate-400 mt-1">
                                    최근 리뷰: ${escapeHtml(latestReview)}
                                </div>
                            </div>

                            ${
                                lowReviews > 0
                                ? `
                                    <div class="px-2 py-1 rounded-full bg-red-100 text-red-600 text-[10px] font-black shrink-0">
                                        LOW ${lowReviews}
                                    </div>
                                `
                                : `
                                    <div class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-600 text-[10px] font-black shrink-0">
                                        SAFE
                                    </div>
                                `
                            }
                        </div>

                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <div class="bg-slate-50 rounded-xl p-3">
                                <div class="text-[10px] text-slate-400 font-bold">
                                    전체 리뷰
                                </div>

                                <div class="text-lg font-black text-slate-800 mt-1">
                                    ${totalReviews}
                                </div>
                            </div>

                            <div class="bg-slate-50 rounded-xl p-3">
                                <div class="text-[10px] text-slate-400 font-bold">
                                    최근 7일
                                </div>

                                <div class="text-lg font-black text-blue-600 mt-1">
                                    ${recent7Days}
                                </div>
                            </div>
                        </div>

                        <div class="mt-3 text-[10px] text-slate-400">
                            마지막 수집: ${escapeHtml(collectedAt)}
                        </div>
                    </button>
                `;
            });

            storeListDiv.innerHTML = `
                <button
                    onclick="filterStore('ALL', this)"
                    class="
                        store-btn
                        w-full
                        text-left
                        rounded-2xl
                        border
                        p-4
                        mb-3
                        transition-all
                        ${currentStore === 'ALL'
                            ? 'border-blue-500 bg-blue-50'
                            : 'border-slate-200 bg-white hover:bg-slate-50'}
                    "
                >
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="text-sm font-black text-slate-800">
                                🌍 전체 매장
                            </div>

                            <div class="text-[10px] text-slate-400 mt-1">
                                전체 리뷰 모니터링
                            </div>
                        </div>

                        <div class="text-xl font-black text-slate-800">
                            ${data.length}
                        </div>
                    </div>
                </button>

                ${cards.join('')}
            `;
        }

        function filterStore(name, btn) {
            currentStore = name;
            visibleReviewCount = 30;

            document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active-store'));
            if (btn) btn.classList.add('active-store');

            renderStoreList(currentSVReviews);
            refreshCurrentReviews();
        }

        function applyKeywordFilter(keywordKey, btn) {
            currentKeyword = keywordKey;
            visibleReviewCount = 30;

            document.querySelectorAll('.keyword-btn').forEach(b => b.classList.remove('active-keyword'));
            if (btn) btn.classList.add('active-keyword');

            refreshCurrentReviews();
        }

        function toggleLowRatingMode(btn) {
            lowRatingOnly = !lowRatingOnly;
            visibleReviewCount = 30;

            if (lowRatingOnly) {
                btn.classList.add('active-keyword');
            } else {
                btn.classList.remove('active-keyword');
            }

            refreshCurrentReviews();
        }

        function clearKeywordFilter() {
            currentKeyword = null;
            visibleReviewCount = 30;

            document.querySelectorAll('.keyword-btn').forEach(b => b.classList.remove('active-keyword'));

            refreshCurrentReviews();
        }

        function filterByKeyword(data) {
            if (!currentKeyword) return data;

            const keywords = KEYWORD_GROUPS[currentKeyword] || [];

            return data.filter(review => {
                const text = normalizeText(review.text || '');
                return keywords.some(keyword => text.includes(keyword.toLowerCase()));
            });
        }

        function filterLowRatings(data) {
            if (!lowRatingOnly) return data;
            return data.filter(review => Number(review.rating || 0) <= 3);
        }

        function loadMoreReviews() {
            visibleReviewCount += 30;
            refreshCurrentReviews();
        }

        function refreshCurrentReviews() {
            if (!currentSV) {
                document.getElementById('review-container').innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">상단 SV 버튼을 눌러주세요.</div>';
                return;
            }

            let data = currentStore === 'ALL'
                ? currentSVReviews
                : currentSVReviews.filter(r => (r.store_name || 'Unknown Store') === currentStore);

            data = filterByKeyword(data);
            data = filterLowRatings(data);

            renderReviews(data, currentStore === 'ALL' ? '전체' : currentStore);
        }

        function handleSortChange() {
            currentSort = document.getElementById('sort-select').value;
            visibleReviewCount = 30;
            refreshCurrentReviews();
        }

        function sortReviews(data) {
            const copied = [...data];

            if (currentSort === 'rating-high') {
                return copied.sort((a, b) => Number(b.rating || 0) - Number(a.rating || 0));
            }

            if (currentSort === 'rating-low') {
                return copied.sort((a, b) => Number(a.rating || 0) - Number(b.rating || 0));
            }

            if (currentSort === 'oldest') {
                return copied.sort((a, b) => estimateDateAgeScore(b.date) - estimateDateAgeScore(a.date));
            }

            return copied.sort((a, b) => estimateDateAgeScore(a.date) - estimateDateAgeScore(b.date));
        }

        function estimateDateAgeScore(dateText) {
            const text = normalizeText(dateText);

            if (!text || text === 'unknown' || text === 'recent') return 999999;

            const numMatch = text.match(/\d+/);
            const num = numMatch ? Number(numMatch[0]) : 1;

            if (text.includes('second') || text.includes('minute') || text.includes('hour')) return 0;
            if (text.includes('초') || text.includes('분') || text.includes('시간')) return 0;
            if (text.includes('dag') || text.includes('day') || text.includes('일')) return num;
            if (text.includes('week') || text.includes('weken') || text.includes('주')) return num * 7;
            if (text.includes('month') || text.includes('maand') || text.includes('maanden') || text.includes('개월')) return num * 30;
            if (text.includes('year') || text.includes('jaar') || text.includes('년')) return num * 365;

            return 999999;
        }

        function getLatestCollectedAt(data) {
            const values = data.map(r => r.collected_at).filter(Boolean).sort().reverse();
            return values[0] || '-';
        }

        function getLatestReviewDate(data) {
            const sorted = [...data].sort((a, b) => estimateDateAgeScore(a.date) - estimateDateAgeScore(b.date));
            return sorted[0]?.date || '-';
        }

        function renderReviews(data, selectedStoreLabel) {
            const sorted = sortReviews(data);
            const visibleReviews = sorted.slice(0, visibleReviewCount);
            const container = document.getElementById('review-container');

            renderSummary(sorted, selectedStoreLabel);

            if (!sorted.length) {
                container.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">표시할 리뷰가 없습니다.</div>';
                return;
            }

            container.innerHTML = visibleReviews.map(r => {
                const rating = Number(r.rating || 5);
                const safeRating = Math.max(0, Math.min(5, Math.round(rating)));
                const stars = '★'.repeat(safeRating) + '☆'.repeat(5 - safeRating);
                const lowRatingClass = rating <= 3 ? 'border-red-200 bg-red-50/40' : 'border-slate-100 bg-white';

                return `
                    <div class="${lowRatingClass} p-5 rounded-2xl shadow-sm border">
                        <div class="flex justify-between items-start gap-3 mb-3">
                            <div>
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${escapeHtml(r.store_name || 'Unknown Store')}</span>
                                    <span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded">${escapeHtml(r.author || 'Anonymous')}</span>
                                    ${rating <= 3 ? '<span class="text-[10px] font-black text-red-600 bg-red-100 px-2 py-0.5 rounded">LOW RATING</span>' : ''}
                                </div>
                                <div class="text-[10px] text-slate-400 mt-2">
                                    리뷰 작성: ${escapeHtml(r.date || 'Unknown')}
                                    <span class="mx-1">·</span>
                                    수집: ${escapeHtml(r.collected_at || '-')}
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <div class="text-amber-400 text-xs font-black">${stars}</div>
                                <div class="text-[10px] text-slate-400 mt-1">${rating.toFixed(1)}</div>
                            </div>
                        </div>

                        <p class="text-sm text-slate-700 leading-relaxed whitespace-pre-line">${highlightKeywords(escapeHtml(r.text || ''))}</p>
                    </div>
                `;
            }).join('');

            if (sorted.length > visibleReviewCount) {
                container.innerHTML += `
                    <div class="flex justify-center pt-2">
                        <button onclick="loadMoreReviews()" class="px-5 py-3 rounded-xl bg-slate-900 text-white text-xs font-black hover:opacity-80 transition-all">
                            리뷰 더보기 (${sorted.length - visibleReviewCount}개 남음)
                        </button>
                    </div>
                `;
            }
        }

        function highlightKeywords(text) {
            if (!currentKeyword) return text;

            const keywords = KEYWORD_GROUPS[currentKeyword] || [];
            let result = text;

            keywords.forEach(keyword => {
                const escapedKeyword = escapeRegex(keyword);
                const regex = new RegExp(`(${escapedKeyword})`, 'gi');
                result = result.replace(regex, '<mark class="bg-yellow-200 rounded px-0.5">$1</mark>');
            });

            return result;
        }

        function renderSummary(data, selectedStoreLabel) {
            const box = document.getElementById('review-summary');
            box.classList.remove('hidden');

            const count = data.length;
            const lowCount = data.filter(r => Number(r.rating || 0) <= 3).length;

            document.getElementById('summary-count').innerText = count;
            document.getElementById('summary-low').innerText = lowCount;
            document.getElementById('summary-latest').innerText = getLatestReviewDate(data);
            document.getElementById('summary-collected').innerText = getLatestCollectedAt(data);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function escapeRegex(value) {
            return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeForOnclick(value) {
            return String(value || '').replaceAll("\\", "\\\\").replaceAll("'", "\\'");
        }

        init();
    </script>
</body>
</html>
