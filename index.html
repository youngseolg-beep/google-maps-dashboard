<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SV 통합 리뷰 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star-active { color: #fbbf24; }
        .star-inactive { color: #d1d5db; }
        .active-sv { background-color: #2563eb !important; color: white !important; ring: 2px; ring-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm">
            <h1 class="text-2xl font-black text-slate-800">📊 SV REVIEW MASTER <span class="text-blue-500 text-sm font-normal ml-2">v1.2.1</span></h1>
            <div id="last-update" class="text-xs text-slate-400">데이터 로드 중...</div>
        </header>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <button onclick="selectSV('이여명', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:ring-2 ring-blue-500 transition-all font-bold text-slate-600">이여명 SV</button>
            <button onclick="selectSV('강소영', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:ring-2 ring-blue-500 transition-all font-bold text-slate-600">강소영 SV</button>
            <button onclick="selectSV('소도희', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:ring-2 ring-blue-500 transition-all font-bold text-slate-600">소도희 SV</button>
            <button onclick="selectSV('최성환', this)" class="sv-tab p-4 bg-white rounded-xl shadow-sm hover:ring-2 ring-blue-500 transition-all font-bold text-slate-600">최성환 SV</button>
        </div>

        <div class="flex gap-6">
            <div class="w-1/4 bg-white p-4 rounded-2xl shadow-sm h-fit min-h-[300px]">
                <h3 class="font-bold mb-4 text-slate-500 text-sm uppercase tracking-wider">담당 매장 목록</h3>
                <div id="store-list" class="space-y-2">
                    <p class="text-xs text-slate-400">SV를 먼저 선택해주세요.</p>
                </div>
            </div>

            <div class="w-3/4">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="current-title" class="text-xl font-bold text-slate-800">전체 리뷰 현황</h2>
                    <select onchange="sortData(this.value)" class="bg-white border-none rounded-lg px-3 py-1 text-sm shadow-sm focus:ring-2 ring-blue-400">
                        <option value="newest">최신순</option>
                        <option value="rating-high">별점 높은순</option>
                        <option value="rating-low">별점 낮은순</option>
                    </select>
                </div>
                <div id="review-container" class="space-y-4">
                    <p class="text-center py-20 text-slate-400">데이터를 불러오는 중이거나 선택된 항목이 없습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // [중요] 수집된 데이터의 URL과 일치해야 합니다. (부분 일치로 검색하도록 로직 수정)
        const SV_MAP = {
            '이여명': ['maps.google.com/1'],
            '강소영': ['maps.google.com/2'],
            '소도희': ['maps.google.com/3'],
            '최성환': ['maps.google.com/9', 'maps.google.com/7', 'maps.google.com/8']
        };

        let allReviews = [];
        let filteredBySV = [];

        async function init() {
            try {
                // 경로를 ./public/data/... 또는 data/... 로 맞춰야 할 수 있음
                const res = await fetch('public/data/reviews.json'); 
                allReviews = await res.json();
                console.log("데이터 로드 성공:", allReviews.length, "건");
                document.getElementById('last-update').innerText = `총 ${allReviews.length}건 수집됨`;
            } catch(e) {
                console.error("데이터 로드 실패:", e);
                document.getElementById('last-update').innerText = "데이터 파일(reviews.json)을 찾을 수 없습니다.";
            }
        }

        function selectSV(name, btn) {
            // 버튼 스타일 초기화 및 적용
            document.querySelectorAll('.sv-tab').forEach(b => b.classList.remove('active-sv'));
            btn.classList.add('active-sv');

            const allowedPatterns = SV_MAP[name];
            
            // 주소에 해당 패턴이 포함되어 있는지 확인 (더 유연한 매칭)
            filteredBySV = allReviews.filter(r => 
                allowedPatterns.some(pattern => r.store_url.includes(pattern))
            );
            
            console.log(name + " SV 데이터:", filteredBySV.length, "건");

            // 매장 목록 업데이트
            const stores = [...new Set(filteredBySV.map(r => r.store_name))];
            const storeListDiv = document.getElementById('store-list');
            
            if(stores.length > 0) {
                storeListDiv.innerHTML = stores.map(s => `
                    <button onclick="filterStore('${s}')" class="w-full text-left p-3 rounded-lg hover:bg-blue-50 text-sm font-medium text-slate-700 border border-transparent hover:border-blue-200 transition-all">
                        📍 ${s}
                    </button>
                `).join('');
                renderReviews(filteredBySV);
                document.getElementById('current-title').innerText = `${name} SV 전체 리뷰`;
            } else {
                storeListDiv.innerHTML = '<p class="text-xs text-red-400 p-2">수집된 매장 데이터가 없습니다. URL 설정을 확인해주세요.</p>';
                document.getElementById('review-container').innerHTML = '';
            }
        }

        function filterStore(storeName) {
            const storeData = filteredBySV.filter(r => r.store_name === storeName);
            document.getElementById('current-title').innerText = `${storeName} 리뷰`;
            renderReviews(storeData);
        }

        function sortData(val) {
            if (val === 'rating-high') filteredBySV.sort((a,b) => b.rating - a.rating);
            else if (val === 'rating-low') filteredBySV.sort((a,b) => a.rating - b.rating);
            renderReviews(filteredBySV);
        }

        function renderReviews(data) {
            const container = document.getElementById('review-container');
            container.innerHTML = data.map(r => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-xs font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded-md mr-2">${r.store_name}</span>
                            <span class="text-xs text-slate-400">${r.collected_at}</span>
                        </div>
                        <div class="flex text-amber-400">
                            ${'★'.repeat(r.rating || 5)}${'☆'.repeat(5 - (r.rating || 5))}
                        </div>
                    </div>
                    <p class="text-slate-700 leading-relaxed">${r.text}</p>
                </div>
            `).join('') || '<div class="text-center py-20 text-slate-400">해당 조건의 리뷰가 없습니다.</div>';
        }

        init();
    </script>
</body>
</html>
