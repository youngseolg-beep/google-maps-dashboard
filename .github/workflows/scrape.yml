name: scrape-and-update
on:
  workflow_dispatch: # 버튼 누르면 실행
    inputs:
      store_url:
        description: '구글 맵 주소'
        required: true
      start_date:
        description: '수집 시작일 (YYYY-MM-DD)'
        default: '2026-01-01'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest # 깃허브의 공용 컴퓨터(리눅스)
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install playwright
          playwright install chromium

      - name: 크롤링 실행
        env:
          GOOGLE_MAPS_URL: ${{ github.event.inputs.store_url }}
          START_DATE: ${{ github.event.inputs.start_date }}
        run: python scraper/scraper.py

      - name: 데이터 업데이트 및 저장
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add public/data/reviews.json
          git commit -m "Update reviews data [skip ci]" || echo "No changes to commit"
          git push
